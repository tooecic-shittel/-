[app]
video_source = "pexels" # 后台素材源，支持 "pexels" / "pixabay" / "local"

# 是否隐藏配置面板。面向普通用户时建议隐藏，API Key 由运营方在本文件统一配置。
hide_config = true
show_admin_config = false
admin_token = "" # 后台访问 token。公网部署时必须设置，访问方式：?admin=1&token=你的token

# Azure TTS V1(edge_tts) 单次流式请求超时时间，单位秒。
# 网络异常、服务端限流或 voice 与文本语言不匹配时，edge_tts 可能长期卡住。
# 默认 30 秒可避免 WebUI 任务无反馈；慢网络或代理环境可适当调大。
# 设置为 0 表示禁用超时。
edge_tts_timeout = 30

# Edge TTS 代理。中国大陆网络下如果语音合成超时，可设置为系统代理地址。
# 例如 ClashX 默认常见端口：edge_tts_proxy = "http://127.0.0.1:7890"
edge_tts_proxy = ""

# macOS 本机测试兜底配音。开启后，Edge TTS 超时也不会导致整条视频生成失败。
# prefer_macos_say_tts 只建议本机/公网临时测试时打开；生产环境可关闭，继续使用云配音。
enable_openai_tts_fallback = true
enable_macos_say_fallback = true
prefer_macos_say_tts = false
macos_say_voice = "Tingting"

# 普通用户默认看到的音色。voice-catalog 会优先调用 MiniMax TTS；
# 未配置 MiniMax 或调用失败时自动回落到 OpenAI-compatible Audio Speech。
default_tts_voice = "voice-catalog:warm_female"
voxcpm2_base_url = "" # 例如：https://your-voxcpm2-domain.com/v1
voxcpm2_api_key = ""  # 如果云服务网关设置了鉴权，在这里填写；裸 vLLM 服务可留空
voxcpm2_model_name = "voxcpm2"
voxcpm2_timeout = 120
voxcpm2_send_voice_prompt = true

# 数字人口播：用于“老板/主播照片或视频 + 本次配音 => 开口说话视频”。
# 默认关闭，不影响普通视频生成。生产优先使用 Duix/硅语云端 provider；
# 本地 duix provider 仅用于已有 GPU/HeyGem face2face 服务的兼容回退。
digital_human_provider = "none" # none / kling / duix_cloud / duix
digital_human_timeout = 300
digital_human_poll_interval = 5
duix_video_base_url = "http://127.0.0.1:8383" # Duix face2face 服务地址
duix_workspace_dir = "~/duix_avatar_data/face2face/temp" # 与 Duix 服务共享的素材目录
duix_result_dir = "" # 留空时默认使用 duix_workspace_dir
duix_project_name = "claw-ecommerce"
duix_chaofen = false
duix_watermark_switch = false
duix_image_video_duration = 5
duix_image_video_fps = 25

# Duix/硅语云端 AIGC 视频合成。普通用户不会看到这些密钥；
# 由运营方在后台统一配置。
duix_cloud_base_url = "https://meta.guiji.ai"
duix_cloud_access_key = ""
duix_cloud_secret_key = ""
duix_cloud_public_base_url = "" # 公网可访问的本服务地址，例如 https://your-domain.example.com
duix_cloud_default_robot_id = ""
duix_cloud_default_scene_id = "" # 已训练数字人的场景 ID；有它时会直接合成，不重复训练
duix_cloud_callback_url = ""
duix_cloud_video_format = "mp4"
duix_cloud_bit_rate = "3.5M"
duix_cloud_width = "720"
duix_cloud_height = "1280"
duix_cloud_fps = "25"
duix_cloud_mask = "1"
duix_cloud_timeout = 900
duix_cloud_training_timeout = 1800
duix_cloud_poll_interval = 5
duix_cloud_request_timeout = 30
duix_cloud_training_level = ""
duix_cloud_training_green_screen = ""
duix_cloud_allow_local_urls = false

# 可灵 Kling Avatar 数字人口播。适合“老板照片/视频 + 配音音频”
# 官方 Avatar 接口使用 image + sound_file；视频素材会先抽帧为人像图。
kling_base_url = "https://api-beijing.klingai.com" # 国内开发者平台用北京区；海外账号可改为 https://api-singapore.klingai.com
kling_access_key = ""
kling_secret_key = ""
kling_api_key = "" # 兼容只需要 Bearer Token 的中转网关；官方 AK/SK 可留空
kling_public_base_url = "" # 官方 Avatar 可留空，系统会自动转 Base64；中转网关需要 URL 时再填公网地址
kling_avatar_path = "/v1/videos/avatar/image2video"
kling_query_path_template = "" # 留空时自动使用 /v1/videos/avatar/image2video/{task_id}
kling_payload_format = "avatar" # avatar / input / flat；中转网关可能需要 input 或 flat
kling_model_name = ""
kling_avatar_mode = "std" # std / pro
kling_prompt = "" # 可选，不能超过 2500 字符；用于描述数字人动作/情绪/运镜
kling_audio_id = "" # 可选；填入后优先用 audio_id，而不是 sound_file URL
kling_lip_sync_mode = "audio2video" # 兼容旧 lip-sync 网关
kling_audio_type = "url"
kling_callback_url = ""
kling_timeout = 900
kling_poll_interval = 5
kling_request_timeout = 30
kling_jwt_ttl = 1800
kling_jwt_nbf_skew = 5
kling_allow_local_urls = false
kling_tts_path = "/v1/audio/tts"
kling_tts_voice_id = "" # 可灵预置/克隆音色 ID；WebUI 选择可灵音色后会自动写入
kling_tts_voice_language = "zh" # zh / en
kling_tts_timeout = 90
kling_tts_download_timeout = 120
kling_custom_voice_path = "/v1/general/custom-voices"
kling_preset_voice_path = "/v1/general/presets-voices"
kling_voice_clone_timeout = 600
kling_show_custom_voices = false # 当前账号确认自定义 voice_id 可用于 TTS 后再打开

# 是否校验外部 API 和素材下载的 TLS 证书。
# 默认必须开启，避免 Pexels/Pixabay API key 和下载素材被中间人攻击篡改。
# 只有在企业代理或自签证书环境明确需要时，才临时改为 false。
tls_verify = true

# Pexels API Key
# Register at https://www.pexels.com/api/ to get your API key.
# You can use multiple keys to avoid rate limits.
# For example: pexels_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# 特别注意格式，Key 用英文双引号括起来，多个Key用逗号隔开
pexels_api_keys = []

# Pixabay API Key
# Register at https://pixabay.com/api/docs/ to get your API key.
# You can use multiple keys to avoid rate limits.
# For example: pixabay_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# 特别注意格式，Key 用英文双引号括起来，多个Key用逗号隔开
pixabay_api_keys = []

# 支持的提供商 (Supported providers):
#   openai
#   aihubmix   (OpenAI-compatible AI model gateway)
#   moonshot    (月之暗面)
#   azure
#   qwen        (通义千问)
#   deepseek
#   gemini
#   ollama
#   g4f        (disabled by default; set enable_g4f=true only after accepting its risks)
#   oneapi
#   cloudflare
#   minimax
#   mimo       (Xiaomi MiMo)
#   ernie       (文心一言)
#   modelscope  (魔搭社区)
#   litellm     (100+ providers via LiteLLM gateway)
llm_provider = "openai"

########## Pollinations AI Settings
